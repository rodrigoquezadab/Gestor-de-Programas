<!DOCTYPE html>
<html lang="es" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestor de Programas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'sans-serif'] },
            colors: {
              brand: { 50: '#f0fdfa', 100: '#ccfbf1', 400: '#2dd4bf', 500: '#14b8a6', 600: '#0d9488', 900: '#134e4a' }
            }
          }
        }
      }
    </script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200 font-sans leading-relaxed transition-colors duration-300">
    <div class="container mx-auto p-4 md:p-8 max-w-6xl min-h-screen flex flex-col">
      <!-- Header Area -->
      <header class="relative z-50 flex justify-between items-center mb-8 bg-white/70 dark:bg-gray-800/70 backdrop-blur-lg p-4 md:px-8 md:py-6 rounded-3xl shadow-sm border border-white dark:border-gray-700 transition-colors duration-300">
        <div class="flex items-center gap-4">
          <div class="bg-gradient-to-br from-brand-400 to-brand-600 w-12 h-12 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-brand-500/30 text-2xl">
            💻
          </div>
          <h1 class="text-2xl md:text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-gray-800 to-gray-500 dark:from-white dark:to-gray-400 tracking-tight">
            Gestor de Programas
          </h1>
        </div>
        <div class="flex items-center gap-3 relative">
          <button id="darkModeToggle" class="p-3 rounded-full bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors duration-200 text-lg shadow-sm" title="Alternar modo oscuro">
            <span id="darkIcon" class="hidden">🌙</span>
            <span id="lightIcon">☀️</span>
          </button>
          
          <!-- Dropdown Herramientas -->
          <div class="relative">
            <button id="toolsToggleBtn" class="p-3 rounded-full bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors duration-200 text-lg shadow-sm" title="Herramientas de Respaldo">
              ⚙️
            </button>
            
            <div id="toolsMenu" class="absolute right-0 mt-3 w-64 bg-white dark:bg-gray-800 rounded-2xl shadow-xl border border-gray-100 dark:border-gray-700 hidden z-50 overflow-hidden transform origin-top-right transition-all">
              <div class="p-2 flex flex-col gap-1">
                <button id="uploadFileButton" class="w-full text-left px-4 py-3 text-sm rounded-xl hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors flex items-center gap-3 font-medium">
                  <span class="text-lg">⬆️</span> Cargar Datos
                </button>
                <input type="file" id="fileUpload" accept=".json" class="hidden" />
                <button id="loadBackupButton" class="w-full text-left px-4 py-3 text-sm rounded-xl hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors flex items-center gap-3 text-orange-600 dark:text-orange-400 font-medium">
                  <span class="text-lg">🔄</span> Cargar Respaldo Original
                </button>
                <button id="downloadDataButton" class="w-full text-left px-4 py-3 text-sm rounded-xl hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors flex items-center gap-3 text-purple-600 dark:text-purple-400 font-medium">
                  <span class="text-lg">⬇️</span> Descargar Datos
                </button>
                <hr class="border-gray-100 dark:border-gray-700 my-2">
                <button id="removeDuplicatesButton" class="hidden w-full text-left px-4 py-3 text-sm rounded-xl hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors items-center gap-3 text-yellow-600 dark:text-yellow-400 font-medium">
                  <span class="text-lg">🗑️</span> Eliminar Duplicados
                </button>
                <button id="clearAllProgramsButton" class="hidden w-full text-left px-4 py-3 text-sm rounded-xl hover:bg-red-50 dark:hover:bg-red-900/30 transition-colors items-center gap-3 text-red-600 dark:text-red-400 font-medium">
                  <span class="text-lg">❌</span> Vaciar Lista
                </button>
              </div>
            </div>
          </div>
        </div>
      </header>
  
      <!-- Controls Area -->
      <div class="mb-8 flex flex-col gap-5 bg-white/50 dark:bg-gray-800/50 backdrop-blur p-5 rounded-3xl border border-white dark:border-gray-700 shadow-sm">
        
        <!-- Barra de búsqueda a todo lo ancho -->
        <div class="relative w-full">
          <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none">
            <span class="text-gray-400 dark:text-gray-500 text-lg">🔍</span>
          </div>
          <input type="text" id="searchInput" placeholder="Buscar por nombre, información, plataforma o categoría..." class="w-full bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 focus:border-brand-500 focus:ring-4 focus:ring-brand-500/10 rounded-2xl py-4 pl-14 pr-5 text-gray-700 dark:text-gray-200 transition-all duration-200 shadow-sm outline-none placeholder-gray-400 dark:placeholder-gray-500 text-base md:text-lg" />
        </div>

        <!-- Fila de Botones y Selectores -->
        <div class="flex flex-col lg:flex-row gap-4 items-center justify-between w-full">
          <div class="flex w-full lg:w-auto gap-3">
            <button id="openAddProgramModalBtn" class="flex-1 lg:flex-none bg-gradient-to-r from-brand-500 to-brand-600 hover:from-brand-600 hover:to-brand-700 text-white font-semibold py-3 px-6 rounded-2xl shadow-md shadow-brand-500/30 transition-all duration-200 transform hover:scale-[1.02] active:scale-95 flex items-center justify-center gap-2">
              <span>➕</span> Nuevo Programa
            </button>
            <button id="toggleVisibilitySortButton" class="flex-1 lg:flex-none bg-white dark:bg-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-200 font-semibold py-3 px-6 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-600 transition-all duration-200 flex items-center justify-center gap-2 transform hover:scale-[1.02] active:scale-95">
              🔤 Ordenar A-Z
            </button>
          </div>
    
          <div class="flex-grow w-full lg:w-auto flex flex-col sm:flex-row gap-3 lg:justify-end">
            <select id="typeFilter" class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-2xl py-3 px-5 text-gray-700 dark:text-gray-200 focus:ring-4 focus:ring-brand-500/10 shadow-sm outline-none transition-all cursor-pointer lg:max-w-xs">
              <option value="">Todas las Plataformas</option>
              <option value="Aplicación de Escritorio">Desktop</option>
              <option value="Web App">Web App</option>
            </select>
            <select id="categoryFilter" class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-2xl py-3 px-5 text-gray-700 dark:text-gray-200 focus:ring-4 focus:ring-brand-500/10 shadow-sm outline-none transition-all cursor-pointer lg:max-w-xs">
              <option value="">Todas las Categorías</option>
              <option value="Ofimática y Productividad">Ofimática</option>
              <option value="Almacenamiento en la Nube">Nube</option>
              <option value="Inteligencia Artificial">IA</option>
              <option value="Herramientas de Edición y Gestión de Archivos">Edición y Archivos</option>
              <option value="Ocio y Entretenimiento">Ocio</option>
              <option value="Gaming (Cloud Gaming)">Gaming</option>
              <option value="Otros">Otros</option>
            </select>
          </div>
        </div>
      </div>
  
      <!-- Import Options Notice -->
      <div id="importOptions" class="bg-white dark:bg-gray-800 p-8 rounded-3xl shadow-xl border border-brand-200 dark:border-brand-900/50 mb-8 hidden transform transition-all relative overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-r from-brand-50 to-white dark:from-gray-800 dark:to-gray-800 opacity-50 z-0"></div>
        <div class="relative z-10">
            <h3 class="text-2xl font-extrabold text-gray-800 dark:text-white mb-6 text-center">
            Opciones de Importación
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <button id="importAddBtn" class="bg-emerald-500 hover:bg-emerald-600 text-white font-semibold py-4 px-4 rounded-2xl shadow-md transition duration-200 transform hover:-translate-y-1 active:scale-95 flex flex-col items-center gap-1">
                <span class="text-2xl">➕</span>
                Añadir nuevos
            </button>
            <button id="importUpdateBtn" class="bg-blue-500 hover:bg-blue-600 text-white font-semibold py-4 px-4 rounded-2xl shadow-md transition duration-200 transform hover:-translate-y-1 active:scale-95 flex flex-col items-center gap-1">
                <span class="text-2xl">🔄</span>
                Añadir y Actualizar
            </button>
            <button id="importReplaceBtn" class="bg-rose-500 hover:bg-rose-600 text-white font-semibold py-4 px-4 rounded-2xl shadow-md transition duration-200 transform hover:-translate-y-1 active:scale-95 flex flex-col items-center gap-1">
                <span class="text-2xl">⚠️</span>
                Reemplazar todo
            </button>
            </div>
            <button id="cancelImportBtn" class="w-full bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-200 font-semibold py-3 px-4 rounded-2xl mt-6 transition duration-200">
            Cancelar Importación
            </button>
        </div>
      </div>
  
      <div class="flex items-center justify-between mb-6 px-4">
        <h2 class="text-xl font-bold text-gray-700 dark:text-gray-200 flex items-center gap-2">
          Catálogo <span class="bg-brand-100 text-brand-800 dark:bg-brand-900/50 dark:text-brand-300 py-1 px-3 rounded-full text-sm font-bold shadow-sm" id="programCount">0</span>
        </h2>
      </div>
  
      <div id="programsList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 pb-12">
        <!-- Items -->
      </div>
    </div>
  
    <!-- Modal -->
    <div id="programModal" class="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center p-4 hidden z-[100] transition-opacity">
      <div class="bg-white dark:bg-gray-800 p-6 sm:p-8 rounded-3xl shadow-2xl w-full max-w-lg relative transform transition-all border border-gray-100 dark:border-gray-700">
        <button id="closeProgramModalBtn" class="absolute top-5 right-5 w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">
          ✕
        </button>
        <h2 class="text-2xl font-bold text-gray-800 dark:text-white mb-6 flex items-center gap-2">
          <span class="text-brand-500">✏️</span> Programa
        </h2>
        <form id="programForm" class="flex flex-col gap-5">
          <input type="hidden" id="programId" />
          
          <div>
            <label for="name" class="block text-gray-700 dark:text-gray-300 text-sm font-semibold mb-1.5">Nombre</label>
            <input type="text" id="name" required class="w-full bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl py-3 px-4 text-gray-700 dark:text-gray-200 focus:ring-4 focus:ring-brand-500/10 outline-none transition-all" />
          </div>
          
          <div>
            <label for="version" class="block text-gray-700 dark:text-gray-300 text-sm font-semibold mb-1.5">Versión</label>
            <input type="text" id="version" required class="w-full bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl py-3 px-4 text-gray-700 dark:text-gray-200 focus:ring-4 focus:ring-brand-500/10 outline-none transition-all" />
          </div>
  
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
            <div>
              <label for="type" class="block text-gray-700 dark:text-gray-300 text-sm font-semibold mb-1.5">Plataforma</label>
              <select id="type" required class="w-full bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl py-3 px-4 text-gray-700 dark:text-gray-200 focus:ring-4 focus:ring-brand-500/10 outline-none transition-all cursor-pointer">
                <option value="Aplicación de Escritorio">Aplicación de Escritorio</option>
                <option value="Web App">Web App</option>
              </select>
            </div>
            <div>
              <label for="category" class="block text-gray-700 dark:text-gray-300 text-sm font-semibold mb-1.5">Categoría</label>
              <select id="category" required class="w-full bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl py-3 px-4 text-gray-700 dark:text-gray-200 focus:ring-4 focus:ring-brand-500/10 outline-none transition-all cursor-pointer">
                <option value="Ofimática y Productividad">Ofimática</option>
                <option value="Almacenamiento en la Nube">Nube</option>
                <option value="Inteligencia Artificial">IA</option>
                <option value="Herramientas de Edición y Gestión de Archivos">Edición y Archivos</option>
                <option value="Ocio y Entretenimiento">Ocio</option>
                <option value="Gaming (Cloud Gaming)">Gaming</option>
                <option value="Otros">Otros</option>
              </select>
            </div>
          </div>
  
          <div>
            <label for="usageInfo" class="block text-gray-700 dark:text-gray-300 text-sm font-semibold mb-1.5">Información de Uso</label>
            <textarea id="usageInfo" rows="3" required class="w-full bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl py-3 px-4 text-gray-700 dark:text-gray-200 focus:ring-4 focus:ring-brand-500/10 outline-none transition-all resize-none"></textarea>
          </div>
  
          <div>
            <label for="url" class="block text-gray-700 dark:text-gray-300 text-sm font-semibold mb-1.5">URL (opcional)</label>
            <input type="url" id="url" class="w-full bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl py-3 px-4 text-gray-700 dark:text-gray-200 focus:ring-4 focus:ring-brand-500/10 outline-none transition-all" />
          </div>
  
          <div class="flex gap-3 mt-4">
            <button id="cancelButton" type="button" class="hidden flex-1 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-200 font-semibold py-3.5 px-4 rounded-xl transition-all">
              Cancelar
            </button>
            <button id="addButton" type="submit" class="flex-1 bg-brand-500 hover:bg-brand-600 text-white font-semibold py-3.5 px-4 rounded-xl shadow-md transition-all">
              Guardar Programa
            </button>
            <button id="updateButton" type="button" class="hidden flex-1 bg-brand-500 hover:bg-brand-600 text-white font-semibold py-3.5 px-4 rounded-xl shadow-md transition-all">
              Actualizar
            </button>
          </div>
        </form>
      </div>
    </div>
  
    <script src="script.js"></script>
  </body>
</html>
